{{- if .Values.migration.enabled -}}
# インストール / アップグレードの前に Alembic マイグレーションを適用する任意の Helm hook Job です。
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "myhome-tools.fullname" . }}-migration
  labels:
    {{- include "myhome-tools.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  {{- with .Values.migration.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "myhome-tools.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "myhome-tools.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migration
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command:
            - alembic
            - upgrade
            - head
          env:
            {{- include "myhome-tools.backendEnv" . | nindent 12 }}
{{- end }}
