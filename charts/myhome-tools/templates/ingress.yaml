{{- if .Values.ingress.enabled -}}
# API とヘルスチェックのパスをバックエンド、それ以外のパスをフロントエンドへルーティングします。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "myhome-tools.fullname" . }}
  labels:
    {{- include "myhome-tools.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "myhome-tools.fullname" . }}-backend
                port:
                  name: http
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ include "myhome-tools.fullname" . }}-backend
                port:
                  name: http
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: {{ include "myhome-tools.fullname" . }}-backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "myhome-tools.fullname" . }}-frontend
                port:
                  name: http
{{- end }}
