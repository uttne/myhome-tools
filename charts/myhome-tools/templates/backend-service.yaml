# API とヘルスチェックのルーティング用にバックエンド Pod をクラスター内部へ公開します。
apiVersion: v1
kind: Service
metadata:
  name: {{ include "myhome-tools.fullname" . }}-backend
  labels:
    {{- include "myhome-tools.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "myhome-tools.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
