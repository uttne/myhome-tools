version: "3"

dotenv:
  - .env

vars:
  ADMIN_EMAIL: '{{default "admin@example.com" .ADMIN_EMAIL}}'
  ADMIN_PASSWORD: '{{default "password" .ADMIN_PASSWORD}}'
  IMAGE_REGISTRY: '{{default "ghcr.io/uttne" .IMAGE_REGISTRY}}'
  IMAGE_TAG: '{{default "latest" .IMAGE_TAG}}'
  FRONTEND_IMAGE: '{{default (printf "%s/myhome-tools-frontend:%s" .IMAGE_REGISTRY .IMAGE_TAG) .FRONTEND_IMAGE}}'
  BACKEND_IMAGE: '{{default (printf "%s/myhome-tools-backend:%s" .IMAGE_REGISTRY .IMAGE_TAG) .BACKEND_IMAGE}}'
  HELM_CHART: '{{default "charts/myhome-tools" .HELM_CHART}}'
  HELM_CHART_NAME: '{{default "myhome-tools" .HELM_CHART_NAME}}'
  HELM_CHART_VERSION: '{{default "0.1.0" .HELM_CHART_VERSION}}'
  HELM_CHART_DEST: '{{default "dist/charts" .HELM_CHART_DEST}}'
  HELM_OCI_REGISTRY: '{{default "oci://ghcr.io/uttne/charts" .HELM_OCI_REGISTRY}}'
  CT_IMAGE: '{{default "quay.io/helmpack/chart-testing:v3.13.0" .CT_IMAGE}}'
  CT_CHART_DIRS: '{{default "charts" .CT_CHART_DIRS}}'
  CT_TARGET_BRANCH: '{{default "main" .CT_TARGET_BRANCH}}'
  HELM_REGISTRY_DIR: '{{if env "APPDATA"}}{{env "APPDATA"}}/helm/registry{{else}}{{env "HOME"}}/.config/helm/registry{{end}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  up:
    desc: Start the Docker Compose development environment
    cmds:
      - docker compose up --build

  up:detached:
    desc: Start the Docker Compose development environment in the background
    cmds:
      - docker compose up -d --build

  down:
    desc: Stop the Docker Compose development environment
    cmds:
      - docker compose down

  ps:
    desc: Show Docker Compose service status
    cmds:
      - docker compose ps

  logs:
    desc: Follow Docker Compose logs
    cmds:
      - docker compose logs -f

  config:
    desc: Validate and print the Docker Compose configuration
    cmds:
      - docker compose config

  db:up:
    desc: Start only the development PostgreSQL service
    cmds:
      - docker compose up -d db

  db:migrate:
    desc: Apply Alembic migrations in the backend container
    cmds:
      - docker compose exec backend uv run alembic upgrade head

  admin:create:
    desc: Create the initial admin user in the backend container
    cmds:
      - docker compose exec backend sh -c "ADMIN_EMAIL={{.ADMIN_EMAIL}} ADMIN_PASSWORD={{.ADMIN_PASSWORD}} uv run python -m app.create_admin"

  nginx:reload:
    desc: Reload the development NGINX configuration
    cmds:
      - docker compose exec nginx nginx -s reload

  nginx:test:
    desc: Validate the development NGINX configuration
    cmds:
      - docker compose exec nginx nginx -t

  backend:lint:
    desc: Run Ruff checks in the backend container
    cmds:
      - docker compose run --rm --no-deps backend uv run ruff check .

  backend:sync:
    desc: Sync backend dependencies in the backend container
    cmds:
      - docker compose exec backend uv sync

  frontend:build:
    desc: Build the frontend in the frontend container
    cmds:
      - docker compose run --rm --no-deps frontend sh -c "pnpm install --frozen-lockfile && pnpm build"

  frontend:storybook:
    desc: Start Storybook in the frontend container
    cmds:
      - docker compose run --rm --no-deps -p 6006:6006 frontend sh -c "pnpm install --frozen-lockfile && pnpm storybook -- --host 0.0.0.0"

  frontend:storybook:build:
    desc: Build Storybook static site in the frontend container
    cmds:
      - docker compose run --rm --no-deps frontend sh -c "pnpm install --frozen-lockfile && pnpm build-storybook"

  check:
    desc: Run the standard validation checks
    cmds:
      - task: config
      - task: nginx:test
      - task: backend:lint
      - task: frontend:build

  image:build:
    desc: Build production frontend and backend images
    cmds:
      - task: image:build:frontend
      - task: image:build:backend

  image:build:frontend:
    desc: Build the production frontend image
    cmds:
      - docker build -f docker/frontend.prod.Dockerfile -t {{.FRONTEND_IMAGE}} .

  image:build:backend:
    desc: Build the production backend image
    cmds:
      - docker build -f docker/backend.prod.Dockerfile -t {{.BACKEND_IMAGE}} .

  image:push:
    desc: Push production frontend and backend images
    cmds:
      - task: image:push:frontend
      - task: image:push:backend

  image:push:frontend:
    desc: Push the production frontend image
    cmds:
      - docker push {{.FRONTEND_IMAGE}}

  image:push:backend:
    desc: Push the production backend image
    cmds:
      - docker push {{.BACKEND_IMAGE}}

  image:publish:
    desc: Build and push production frontend and backend images
    cmds:
      - task: image:build
      - task: image:push

  helm:lint:
    desc: Lint the Helm chart
    cmds:
      - helm lint {{.HELM_CHART}}

  helm:template:
    desc: Render the Helm chart manifests
    cmds:
      - helm template myhome-tools {{.HELM_CHART}}

  helm:package:
    desc: Package the Helm chart
    cmds:
      - mkdir -p {{.HELM_CHART_DEST}}
      - helm package {{.HELM_CHART}} --destination {{.HELM_CHART_DEST}}

  helm:push:
    desc: Push the packaged Helm chart to an OCI registry
    deps:
      - helm:package
    cmds:
      - helm push {{.HELM_CHART_DEST}}/{{.HELM_CHART_NAME}}-{{.HELM_CHART_VERSION}}.tgz {{.HELM_OCI_REGISTRY}}

  helm:publish:
    desc: Lint, package, and push the Helm chart to an OCI registry
    cmds:
      - task: helm:lint
      - task: helm:push

  helm:version:remote:
    desc: Print the latest Helm chart version in the OCI registry
    cmds:
      - |
        docker run --rm \
          -v "{{.ROOT_DIR}}:/work" \
          -v "{{.HELM_REGISTRY_DIR}}:/root/.config/helm/registry:ro" \
          -w /work \
          "{{.CT_IMAGE}}" \
          sh -c '
            helm show chart "{{.HELM_OCI_REGISTRY}}/{{.HELM_CHART_NAME}}" \
              | awk "/^version:/ { print \$2; exit }"
          '

  helm:ct:list-changed:
    desc: List Helm charts changed from the chart-testing target branch
    cmds:
      - |
        docker run --rm \
          -v "{{.ROOT_DIR}}:/work" \
          -v "{{.HELM_REGISTRY_DIR}}:/root/.config/helm/registry:ro" \
          -w /work \
          "{{.CT_IMAGE}}" \
          sh -c '
            git config --global --add safe.directory /work
            ct list-changed \
              --chart-dirs "{{.CT_CHART_DIRS}}" \
              --target-branch "{{.CT_TARGET_BRANCH}}"
          '

  helm:ct:lint:
    desc: Lint changed Helm charts with chart-testing in Docker
    cmds:
      - |
        docker run --rm \
          -v "{{.ROOT_DIR}}:/work" \
          -v "{{.HELM_REGISTRY_DIR}}:/root/.config/helm/registry:ro" \
          -w /work \
          "{{.CT_IMAGE}}" \
          sh -c '
            git config --global --add safe.directory /work
            ct lint \
              --chart-dirs "{{.CT_CHART_DIRS}}" \
              --target-branch "{{.CT_TARGET_BRANCH}}" \
              --check-version-increment=false
          '

  helm:publish:next-patch:
    desc: Push changed Helm charts with the latest OCI patch version incremented
    cmds:
      - task: helm:version:remote
      - task: helm:ct:list-changed
      - task: helm:ct:lint
      - |
        docker run --rm \
          -v "{{.ROOT_DIR}}:/work" \
          -v "{{.HELM_REGISTRY_DIR}}:/root/.config/helm/registry:ro" \
          -w /work \
          "{{.CT_IMAGE}}" \
          sh -c '
            set -eu
            git config --global --add safe.directory /work

            changed_charts="$(
              ct list-changed \
                --chart-dirs "{{.CT_CHART_DIRS}}" \
                --target-branch "{{.CT_TARGET_BRANCH}}"
            )"
            if [ -z "$changed_charts" ]; then
              echo "No chart changes detected."
              exit 0
            fi

            latest_version="$(
              helm show chart "{{.HELM_OCI_REGISTRY}}/{{.HELM_CHART_NAME}}" \
                | awk "/^version:/ { print \$2; exit }"
            )"
            major="${latest_version%%.*}"
            rest="${latest_version#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
            case "$major.$minor.$patch" in
              *[!0-9.]*|.*|*..*|*.)
                echo "Only MAJOR.MINOR.PATCH versions are supported: $latest_version" >&2
                exit 1
                ;;
            esac
            next_version="$major.$minor.$((patch + 1))"

            mkdir -p "{{.HELM_CHART_DEST}}"
            printf "%s\n" "$changed_charts" | while IFS= read -r chart; do
              package="{{.HELM_CHART_DEST}}/$(basename "$chart")-$next_version.tgz"
              helm package "$chart" \
                --destination "{{.HELM_CHART_DEST}}" \
                --version "$next_version"
              helm push "$package" "{{.HELM_OCI_REGISTRY}}"
            done
          '

  local:backend:sync:
    desc: Sync backend dependencies on the host
    dir: backend
    cmds:
      - uv sync

  local:backend:migrate:
    desc: Apply Alembic migrations from the host
    dir: backend
    cmds:
      - uv run alembic upgrade head

  local:backend:dev:
    desc: Start the backend development server on the host
    dir: backend
    cmds:
      - uv run uvicorn app.main:app --host 0.0.0.0 --reload

  local:frontend:install:
    desc: Install frontend dependencies on the host
    dir: frontend
    cmds:
      - pnpm install

  local:frontend:dev:
    desc: Start the frontend development server on the host
    dir: frontend
    cmds:
      - pnpm dev

  local:frontend:build:
    desc: Build the frontend on the host
    dir: frontend
    cmds:
      - pnpm build

  local:frontend:storybook:
    desc: Start Storybook on the host
    dir: frontend
    cmds:
      - pnpm storybook

  local:frontend:storybook:build:
    desc: Build Storybook static site on the host
    dir: frontend
    cmds:
      - pnpm build-storybook
