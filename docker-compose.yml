services:
  nginx:
    image: nginx:1.27-alpine
    container_name: myhome-tools-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    container_name: myhome-tools-backend
    working_dir: /workspace/backend
    command: >
      sh -c "uv sync
      && uv run alembic upgrade head
      && uv run uvicorn app.main:app --host 0.0.0.0 --reload"
    environment:
      APP_NAME: myhome-tools
      DATABASE_URL: postgresql+psycopg://myhome:myhome@db:5432/myhome_tools
      FRONTEND_ORIGIN: http://localhost:8080
      JWT_SECRET_KEY: change-me-in-local-env
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      AUTH_COOKIE_NAME: myhome_access_token
      SECURE_COOKIES: "false"
      EXTERNAL_LOGOUT_URL: ""
      FILE_STORAGE_ROOT: /workspace/data/files
      UV_PROJECT_ENVIRONMENT: /opt/venv/backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/workspace/backend/app
      - ./backend/alembic:/workspace/backend/alembic
      - ./backend/alembic.ini:/workspace/backend/alembic.ini:ro
      - ./backend/pyproject.toml:/workspace/backend/pyproject.toml:ro
      - ./backend/uv.lock:/workspace/backend/uv.lock
      - backend-venv:/opt/venv
      - backend-uv-cache:/root/.cache/uv
      - ./data/files:/workspace/data/files
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    container_name: myhome-tools-frontend
    working_dir: /workspace/frontend
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"
    environment:
      CI: "true"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend/src:/workspace/frontend/src
      - ./frontend/index.html:/workspace/frontend/index.html:ro
      - ./frontend/package.json:/workspace/frontend/package.json:ro
      - ./frontend/pnpm-lock.yaml:/workspace/frontend/pnpm-lock.yaml
      - ./frontend/tsconfig.json:/workspace/frontend/tsconfig.json:ro
      - ./frontend/tsconfig.node.json:/workspace/frontend/tsconfig.node.json:ro
      - ./frontend/vite.config.ts:/workspace/frontend/vite.config.ts:ro
      - frontend-node-modules:/workspace/frontend/node_modules
      - frontend-dist:/workspace/frontend/dist
      - pnpm-store:/pnpm/store
    depends_on:
      - backend

  db:
    image: postgres:17
    container_name: myhome-tools-db
    environment:
      POSTGRES_DB: myhome_tools
      POSTGRES_USER: myhome
      POSTGRES_PASSWORD: myhome
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myhome -d myhome_tools"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  backend-venv:
  backend-uv-cache:
  frontend-node-modules:
  frontend-dist:
  pnpm-store:
  postgres-data:
